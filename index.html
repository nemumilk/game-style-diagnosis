<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゲームプレイスタイル診断</title>

    <style>
        body{
            font-family:sans-serif;
            background:#111827;
            color:white;
            text-align:center;
            padding:50px;
        }

        .card{
            max-width:700px;
            margin:auto;
            background:#1f2937;
            padding:40px;
            border-radius:20px;
        }

        h1{
            font-size:2.5rem;
        }

        button{
            background:#3b82f6;
            color:white;
            border:none;
            padding:15px 30px;
            border-radius:10px;
            font-size:1.1rem;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>ゲームプレイスタイル診断</h1>

    <p>
        あなたのゲームに対する価値観と、
        グループ内での役割を分析します。
    </p>

    <br>

    <button onclick="startDiagnosis()">
        診断を始める
    </button>
</div>

<script>
function startDiagnosis(){
    alert("診断ページは次の段階で作成します！");
}
</script>

</body>
</html>
