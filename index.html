<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲームプレイスタイル診断</title>

<style>
body{
    font-family:sans-serif;
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:20px;
}

.card{
    background:#1f2937;
    max-width:700px;
    width:100%;
    padding:40px;
    border-radius:20px;
}

h1,h2{
    text-align:center;
}

button{
    width:100%;
    margin-top:10px;
    padding:15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.answer{
    background:#374151;
    color:white;
}

.answer:hover{
    background:#4b5563;
}

.startBtn{
    background:#2563eb;
    color:white;
}

.result{
    font-size:20px;
    line-height:1.8;
}
</style>
</head>

<body>

<div class="card" id="app">
    <h1>ゲームプレイスタイル診断</h1>

    <p>
        あなたのゲームに対する価値観を分析します。
    </p>

    <button class="startBtn" onclick="startDiagnosis()">
        診断を始める
    </button>
</div>

<script>

const questions = [

{
text:"負けるくらいなら多少つまらなくても勝ちたい",
type:"fighter"
},
{
text:"勝ったとしても面白くなければ満足できない",
type:"tainer"
},
{
text:"ゲームでは結果より過程が大事だ",
type:"tainer"
},
{
text:"負けた時は楽しさより先に敗因を考える",
type:"fighter"
},
{
text:"有利な戦法があるなら積極的に使うべきだ",
type:"fighter"
},
{
text:"みんなと同じ戦法を使うくらいなら不利でも別の方法を試したい",
type:"tricky"
},
{
text:"初見のゲームではまずルールの穴や強い行動を探す",
type:"ruler"
},
{
text:"効率が悪くても面白そうならやってみる",
type:"tricky"
},
{
text:"味方がふざけて負けると少しイラっとする",
type:"fighter"
},
{
text:"味方がふざけていても場が盛り上がっていれば気にならない",
type:"tainer"
},
{
text:"チーム戦では役割分担や作戦が重要だと思う",
type:"ruler"
},
{
text:"作戦通りより予想外の展開の方が楽しい",
type:"tricky"
},
{
text:"まずは勝つ方法を見つけたい",
type:"fighter"
},
{
text:"まずは最適な攻略法を見つけたい",
type:"ruler"
},
{
text:"まずはみんなで楽しみたい",
type:"tainer"
},
{
text:"まずは変なことを試したい",
type:"tricky"
}
];

let currentQuestion = 0;

let score = {
fighter:0,
ruler:0,
tainer:0,
tricky:0
};

const answers = [
{label:"とてもそう思う",point:5},
{label:"ややそう思う",point:4},
{label:"どちらでもない",point:3},
{label:"あまりそう思わない",point:2},
{label:"全くそう思わない",point:1}
];

function startDiagnosis(){
    showQuestion();
}

function showQuestion(){

    const q = questions[currentQuestion];

    let html = `
    <h2>質問 ${currentQuestion+1} / ${questions.length}</h2>
    <p>${q.text}</p>
    `;

    answers.forEach(a=>{
        html += `
        <button class="answer"
        onclick="answerQuestion(${a.point})">
        ${a.label}
        </button>
        `;
    });

    document.getElementById("app").innerHTML = html;
}

function answerQuestion(point){

    const type = questions[currentQuestion].type;

    score[type] += point;

    currentQuestion++;

    if(currentQuestion < questions.length){
        showQuestion();
    }else{
        showResult();
    }
}

function showResult(){

    let winner = "fighter";

    for(let key in score){
        if(score[key] > score[winner]){
            winner = key;
        }
    }

   const names = {
    fighter:"ファイター",
    ruler:"ルーラー",
    tainer:"テイナー",
    tricky:"トリッキー"
};

const descriptions = {

fighter:`
「勝つ＝楽しい」を徹底追求する勝負師。

勝利そのものに価値を感じるタイプ。
有利な戦法や最善手を積極的に選び、
負けた時は敗因を分析して改善しようとする。

時には周囲からガチ勢と思われることもあるが、
本人にとっては全力で勝負することが最大の楽しみ。
`,

ruler:`
効率的な動きや法則を見出す知略家。

攻略法や最適解を探すことに喜びを感じる。
最初は様々な方法を試しながら、
徐々に自分なりの理論を組み立てていく。

勝利だけでなく、
「なぜ勝てたのか」を理解することを重視する。
`,

tainer:`
「楽しんでいる人が多ければそれで良い」エンターテイナー。

勝ち負けよりも場の雰囲気や盛り上がりを大切にする。
面白くなるなら多少脱線することも厭わない。

一緒に遊ぶ人たちの笑顔やリアクションが
何よりの報酬になるタイプ。
`,

tricky:`
人とは違う手段や予想外の行動を好む表現者。

定石や効率よりも、
自分らしいプレイや理想を重視する。

たとえ勝率が下がっても、
「やりたいことをやり切る」ことに価値を感じる。
独創的な発想で周囲を驚かせることが多い。
`
};

    document.getElementById("app").innerHTML = `
    <h1>診断結果</h1>

    <div class="result">

    ファイター：${score.fighter}<br>
    ルーラー：${score.ruler}<br>
    テイナー：${score.tainer}<br>
    トリッキー：${score.tricky}<br><br>

    <h2>あなたは「${names[winner]}」タイプです！</h2>

<p style="text-align:left; margin-top:20px;">
${descriptions[winner]}
</p>

    </div>
    `;
}

</script>

</body>
</html>
